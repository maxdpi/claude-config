name: Claude Code Review

# Automatically review every pull request with Claude.
# Mirrors the AI-reviewer setup on manaflow-ai/cmux. Requires the
# CLAUDE_CODE_OAUTH_TOKEN secret (generate with `claude setup-token`,
# then add under Settings -> Secrets and variables -> Actions).

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Review PR with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Show a live progress checklist on the PR while reviewing.
          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. This repo is a Claude Code configuration
            project (skills, subagents, commands, conventions, and the Python
            persistence/orchestration substrate). Read `conventions/` for the
            project's own doc and code-quality standards and apply them.

            Focus on:
            1. **Correctness** — bugs, broken edge cases, wrong assumptions in
               skill workflows and the Python substrate (`skills/scripts`).
            2. **Conventions** — conformance to the rules in `conventions/`
               (doc structure, CLAUDE.md indexes, naming, altitude).
            3. **Consistency** — docs/indexes (`CLAUDE.md`, READMEs) kept in
               sync with file moves/adds; settings.json/hooks coherent.
            4. **Tests** — adequate coverage for substrate changes under
               `tests/`; missing or weak cases.

            Use inline comments for specific issues and a top-level comment for
            the overall summary. Be concise; skip praise unless it's load-bearing.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
