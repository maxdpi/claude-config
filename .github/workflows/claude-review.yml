name: Claude Code Review

# Automatically review every pull request with Claude, using Anthropic's
# official `code-review` skill (the same /code-review logic, run in CI).
#
# Auth: keeps the Max subscription token (CLAUDE_CODE_OAUTH_TOKEN). NOTE — the
# official GitHub Actions docs only document `anthropic_api_key`; subscription
# OAuth tokens may be rejected for unattended automation. --debug is enabled
# temporarily to capture the exact auth error; remove it once auth is settled.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Review PR with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Install Anthropic's official code-review skill from the plugin
          # marketplace and run it against this PR (see GitHub Actions docs,
          # "Using skills"). --comment posts findings as inline PR comments.
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment"

          # Temporary diagnostics: the action masks SDK output by default
          # ("full output hidden for security"), so --debug alone isn't enough.
          # show_full_output: true unmasks the real API/auth error in the log.
          # Remove both once auth is settled.
          show_full_output: true
          claude_args: |
            --debug
